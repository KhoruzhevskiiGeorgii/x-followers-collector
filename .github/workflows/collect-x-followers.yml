name: collect-x-followers

on:
  workflow_dispatch:
  schedule:
    - cron: '15 20 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Collect followers
        env:
          X_USERNAME: sphere_homotopy
          WEBAPP_URL: https://script.google.com/macros/s/AKfycbwFSXhIklzjbHqxVe93t67lTuNS3WG0dnVlFijSBB8PL3gxv2O4RPToUx2cYXtOoDMPxg/exec
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: npm run collect
